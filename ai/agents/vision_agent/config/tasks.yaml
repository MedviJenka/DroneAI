vision_task:
  description: |
    Use the Target Finder Tool to analyze the current camera feed and locate the landing target.

    Call the tool with:
      - drone_image_path: {image_path_url}
      - target_image_path: {target_image_path}

    Report:
    - All visible objects and hazards
    - Whether the target landing pad is visible (yes/no)
    - If visible: its position in the frame (center / left / right / top / bottom / top-left / top-right / bottom-left / bottom-right)
    - If visible: whether the drone is directly above it, close, or far
    - Estimated distances to any obstacles
  expected_output: >
    A detailed visual analysis: target visibility and position, object list,
    hazard list, and obstacle distances.
  agent: vision_agent


pilot_task:
  description: |
    Read the visual analysis from the vision agent and decide the drone's next action.
    The camera starts forward-facing (0°). Negative camera_angle tilts it toward the ground (-90° = straight down).

    Phase 1 — SEARCH (target not visible, camera forward):
      move_to=ROTATE, camera_angle=0, is_safe_to_land=False

    Phase 2 — APPROACH (target visible in forward/angled camera):
      The target is in front of the drone, not below it yet.
      - Tilt camera down: camera_angle=-30
      - Move toward it: move_to=FORWARD
      - Adjust lateral: if target is left→ LEFT, right→ RIGHT
      - is_safe_to_land=False

    Phase 3 — POSITION OVERHEAD (camera tilted ~-30° to -60°, target visible):
      Keep adjusting to center the target in the frame.
      - Continue tilting camera down: camera_angle=-30
      - Fine lateral corrections: LEFT / RIGHT / FORWARD / BACKWARD
      - is_safe_to_land=False

    Phase 4 — CONFIRM OVERHEAD (camera pointing straight down ~-90°, target centered):
      The drone is directly above the target.
      - move_to=DOWN to descend closer
      - camera_angle=0 (already at max tilt, no further adjustment)
      - is_safe_to_land=False

    Phase 5 — LAND (camera down, target centered AND large in frame, drone close):
      - move_to=None, camera_angle=0, is_safe_to_land=True

    Never set is_safe_to_land=True unless the camera is pointing downward
    and the target is both centered and fills most of the frame.
  expected_output: >
    A fully populated structured navigation decision including:
    scene_summary (one sentence), flight_phase, objects list, hazards list,
    obstacle distances, target_found, target_position, target_size,
    move_to direction, camera_angle adjustment, and is_safe_to_land flag.
  agent: pilot_agent
  context: [vision_task]
